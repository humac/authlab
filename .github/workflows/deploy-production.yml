name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TURSO_DATABASE_NAME: ${{ secrets.TURSO_DATABASE_NAME }}
      TURSO_API_TOKEN: ${{ secrets.TURSO_API_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Turso CLI
        run: curl -sSfL https://get.tur.so/install.sh | bash

      - name: Apply Turso migrations
        run: |
          export PATH="$HOME/.turso:$PATH"
          chmod +x ./scripts/ci/apply-turso-migrations.sh
          ./scripts/ci/apply-turso-migrations.sh

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Validate required Vercel env vars
        run: |
          ENV_FILE=".vercel/.env.production.local"
          if [ ! -f "$ENV_FILE" ]; then
            echo "Missing $ENV_FILE after vercel pull"
            exit 1
          fi

          required_vars=(
            MASTER_ENCRYPTION_KEY
            SESSION_PASSWORD
            NEXT_PUBLIC_APP_URL
            TURSO_DATABASE_URL
            TURSO_AUTH_TOKEN
            DATABASE_URL
          )

          missing=()
          for var in "${required_vars[@]}"; do
            if ! grep -q "^${var}=" "$ENV_FILE"; then
              missing+=("$var")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Missing required Vercel production env vars: ${missing[*]}"
            exit 1
          fi

      - name: Build Vercel artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
